<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Déclarations</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;

    background-image:url("fond.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* APP */
.app{
    width:100%;
    max-width:500px;
    margin-top:30px;
}

/* HEADER */
.header{
    text-align:center;
    padding:25px;
    background:transparent;
}

/* LOGO */
.logo{
    width:200px;
    height:200px;
    object-fit:contain;
    animation: float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-5px);}
}

/* MENU */
.menu{
    padding:20px;
    border-radius:0 0 20px 20px;
}

/* 🔥 BOUTONS FIX CENTRAGE PRO */
.menu button{
    width:100%;
    margin:12px 0;
    padding:18px 20px;
    border:none;
    border-radius:18px;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center; /* 🔥 CENTRAGE PARFAIT */
    gap:14px;

    color:white;
    font-size:18px;
    font-weight:700;

    transition:0.25s ease;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    position:relative;
    overflow:hidden;
}

/* hover moderne */
.menu button:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 28px rgba(0,0,0,0.25);
}

/* clic */
.menu button:active{
    transform:scale(0.97);
}

/* effet lumière subtil */
.menu button::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:120%;
    height:100%;
    background:rgba(255,255,255,0.15);
    transform:skewX(-20deg);
    transition:0.5s;
}

.menu button:hover::before{
    left:120%;
}

/* ICONES */
.icon{
    width:44px;
    height:44px;
    background:rgba(255,255,255,0.20);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    flex-shrink:0;
}

/* ❗ TES COULEURS INCHANGÉES */
.essence{background:linear-gradient(135deg,#0f6d2f,#2ecc71);}
.cartons{background:linear-gradient(135deg,#0f6d2f,#2ecc71);}
.produits{background:linear-gradient(135deg,#0f6d2f,#2ecc71);}
.vehicule{background:linear-gradient(135deg,#0f6d2f,#2ecc71);}
.absence{background:linear-gradient(135deg,#770707,#ff1900);}

</style>

</head>

<body>

<div class="app">

<div class="header">
    <img src="logo.png" class="logo">
    <h1>Déclarations</h1>
</div>

<div class="menu">

<button class="essence" onclick="openLink('https://forms.gle/yVYTGjaJyB2QxdsYA')">
    <div class="icon"><i class="fa-solid fa-gas-pump"></i></div>
    Essence
</button>

<button class="cartons" onclick="openLink('https://forms.gle/y4XvHjUYRJJisRLV9')">
    <div class="icon"><i class="fa-solid fa-box"></i></div>
    Cartons
</button>

<button class="produits" onclick="openLink('https://forms.gle/ai1GYK8oQExdjcqf9')">
    <div class="icon"><i class="fa-solid fa-clipboard-list"></i></div>
    Produits
</button>

<button class="vehicule" onclick="openLink('https://forms.gle/XK8YxJEu8fU9YH4m6')">
    <div class="icon"><i class="fa-solid fa-car"></i></div>
    Véhicule
</button>

<button class="absence" onclick="openLink('https://forms.gle/aZaW1G4DkNY3HNZZA')">
    <div class="icon"><i class="fa-solid fa-xmark"></i></div>
    Absence
</button>

</div>

</div>

<script>
function openLink(url){
    window.open(url, "_blank");
}
</script>

</body>
</html>
